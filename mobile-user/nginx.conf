# Crowdly mobile-user — Flutter web bundle served via nginx.
# Reverse-proxies API + WebSocket calls so the Flutter app can keep using
# same-origin URLs (matches the web frontend setup).

upstream crowdly_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter's compiled assets get content-hashed names — cache them long-term.
    location ~* \.(?:js|css|wasm|ico|svg|woff2?|ttf|otf|png|jpg|jpeg|webp)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://crowdly_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /ws/ {
        proxy_pass http://crowdly_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # SPA / Flutter web routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
