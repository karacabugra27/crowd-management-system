# Crowdly tarayıcı APK distribution.
# Serves the prebuilt APK + a tiny landing page over HTTP.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Force download for the APK so mobile browsers actually trigger an
    # "install application" flow instead of trying to render the binary.
    location = /crowdly-scanner.apk {
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="crowdly-scanner.apk"';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
