<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Crowdly — Akıllı Kampüs Kalabalık Yönetim Sistemi. Kampüs alanlarının gerçek zamanlı doluluk takibi." />
    <title>Crowdly — Kampüs Kalabalık Yönetimi</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <script>
      // FOUC-free theme init — runs before React mount
      (function () {
        try {
          var stored = localStorage.getItem('crowdly-theme');
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.setAttribute('data-theme', stored);
          }
        } catch (e) { /* localStorage unavailable */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
