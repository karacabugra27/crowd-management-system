# Crowdly web — nginx config.
# Serves the Vite-built SPA and reverse-proxies API + WebSocket traffic
# to the backend container (name resolved from docker network).

upstream crowdly_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-term cache for hashed assets — vite emits content-hashed filenames.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # REST API
    location /api/ {
        proxy_pass http://crowdly_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket — needs the Upgrade headers.
    location /ws/ {
        proxy_pass http://crowdly_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Health passthrough for compose healthchecks/debugging.
    location = /health {
        proxy_pass http://crowdly_backend/health;
    }

    # SPA fallback — every non-asset path returns index.html so React Router
    # can handle deep links like /admin/login on a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
