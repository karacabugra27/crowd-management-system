version: '3.9'

services:
  # ── Backend API ────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: campus_backend
    ports:
      - "8000:8000"
    environment:
      - FCM_SERVER_KEY=${FCM_SERVER_KEY:-}
      - DATABASE_URL=postgresql://campus:campus_pass@postgres:5432/campus_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - campus_net

  # ── Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: campus_postgres
    environment:
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: campus_pass
      POSTGRES_DB: campus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus -d campus_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campus_net

  # ── Data Collector ─────────────────────────────────────────────
  collector:
    build: ./data-collector
    container_name: campus_collector
    environment:
      - API_BASE_URL=http://backend:8000
      - POLL_INTERVAL_SECONDS=60
      - USE_MOCK=true
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - campus_net
    restart: unless-stopped

  # ── React Frontend ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: campus_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - campus_net

volumes:
  postgres_data:

networks:
  campus_net:
    driver: bridge
