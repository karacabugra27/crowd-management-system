name: campus_pulse
description: "Akıllı Kampüs Kalabalık Yönetim Sistemi — Gerçek zamanlı doluluk bilgisi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP client
  http: ^1.2.0
  
  # Charts
  fl_chart: ^0.68.0
  
  # State management
  provider: ^6.1.2
  
  # Local storage
  shared_preferences: ^2.3.2
  
  # Firebase (optional — comment out if not using)
  # firebase_core: ^2.27.0
  # firebase_messaging: ^14.7.10

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
